version: "3.9"

services:
  db:
    image: mysql:5.7
    container_name: app-database
    restart: always
    volumes:
      - volume-db:/var/lib/mysql
    ports:
      - "3320:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: birthday
      MYSQL_USER: user
      MYSQL_PASSWORD: root

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: app-phpmyadmin
    depends_on:
      - db
    restart: always
    ports:
      - "8888:80"
    environment:
      - PMA_ARBITRARY=1
      - PMA_HOST=db

  python:
    build: .
    container_name: app-python
    restart: on-failure
    working_dir: /app
    volumes:
      - .:/app
    environment:
      - DISCORD_TOKEN=${DISCORD_TOKEN}
      - MYSQL_HOST=db
      - MYSQL_DATABASE=birthday
      - MYSQL_USER=root
      - MYSQL_PASSWORD=root
      - MYSQL_PORT=3306

volumes:
  volume-db:
